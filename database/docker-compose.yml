version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: agenthire-postgres
    environment:
      POSTGRES_DB: agenthire
      POSTGRES_USER: agenthire
      POSTGRES_PASSWORD: agenthire_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthire -d agenthire"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agenthire-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agenthire-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agenthire.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - agenthire-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  agenthire-network:
    driver: bridge
