# Redis 配置文件
# AgentHire - AI Agent驱动的招聘平台

# 基础配置
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# 日志配置
loglevel notice
logfile ""

# 持久化配置（RDB）
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 持久化配置（AOF）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 安全配置（开发环境不设置密码，生产环境通过环境变量设置）
# requirepass your_password_here

# 客户端配置
maxclients 10000

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 事件通知（用于 Celery）
notify-keyspace-events Ex

# 性能优化
hz 10
dynamic-hz yes

# 复制配置（主从模式时使用）
# replicaof <masterip> <masterport>
# masterauth <master-password>

# 集群配置（集群模式时使用）
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000
