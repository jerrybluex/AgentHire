# 生产环境 Docker Compose 配置（预览版）
# AgentHire - AI Agent驱动的招聘平台
#
# 注意：这是生产环境的预览配置，实际生产部署建议使用 Kubernetes
# 关键差异：
# - 多副本API服务
# - 使用外部托管数据库（RDS/Cloud SQL）
# - 使用云厂商对象存储（S3/OSS）
# - 启用SSL/TLS
# - 更严格的资源限制
# - 日志收集和监控

version: '3.8'

services:
  # FastAPI 后端服务 - 生产模式
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: agenthire/api:${VERSION:-latest}
    container_name: agenthire-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-agenthire}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
    deploy:
      replicas: ${API_REPLICAS:-3}
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agenthire-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service_name,environment"

  # Celery Worker - 异步任务处理
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: agenthire/worker:${VERSION:-latest}
    container_name: agenthire-worker
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-agenthire}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-4}
      - CELERY_WORKER_PREFETCH_MULTIPLIER=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agenthire-network
    command: >
      celery -A app.tasks worker
      --loglevel=info
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
      --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      --max-tasks-per-child=1000
      --without-gossip
      --without-mingle
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Celery Beat - 定时任务调度
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: agenthire/scheduler:${VERSION:-latest}
    container_name: agenthire-scheduler
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN:-}
    deploy:
      replicas: 1  # Beat 只能有一个实例
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agenthire-network
    command: >
      celery -A app.tasks beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --max-interval=300
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Celery Flower - 任务监控（可选）
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: agenthire/flower:${VERSION:-latest}
    container_name: agenthire-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:admin}
      - FLOWER_URL_PREFIX=${FLOWER_URL_PREFIX:-/flower}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - agenthire-network
    command: >
      celery -A app.tasks flower
      --port=5555
      --url_prefix=${FLOWER_URL_PREFIX:-/flower}
      --basic_auth=${FLOWER_BASIC_AUTH:-admin:admin}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Nginx 反向代理 - 生产配置
  nginx:
    image: nginx:alpine
    container_name: agenthire-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./devops/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./devops/nginx/ssl:/etc/nginx/ssl:ro
      - ./devops/nginx/logs:/var/log/nginx
      - static_files:/var/www/static:ro
    depends_on:
      - api
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - agenthire-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # 可选：本地 PostgreSQL（仅用于测试，生产使用托管服务）
  # db:
  #   image: ankane/pgvector:v0.5.1
  #   container_name: agenthire-db
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_DB=${POSTGRES_DB}
  #     - POSTGRES_USER=${POSTGRES_USER}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - agenthire-network

  # 可选：本地 Redis（仅用于测试，生产使用托管服务）
  # redis:
  #   image: redis:7-alpine
  #   container_name: agenthire-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #     - ./devops/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
  #   networks:
  #     - agenthire-network

# 数据卷
volumes:
  static_files:
    driver: local
  # postgres_data:
  #   driver: local
  # redis_data:
  #   driver: local

# 网络
networks:
  agenthire-network:
    driver: bridge
